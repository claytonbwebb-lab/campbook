<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Get Started — CampBook</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0d2218 0%,#1a3a2a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
  .card{background:#fff;border-radius:16px;padding:2.5rem;width:100%;max-width:460px;box-shadow:0 32px 80px rgba(0,0,0,.3)}
  .logo{font-size:1.4rem;font-weight:700;color:#1a3a2a;margin-bottom:.25rem}
  .logo span{color:#3a5a40}
  .subtitle{font-size:.9rem;color:#6b7280;margin-bottom:2rem}
  .field{margin-bottom:1rem}
  .field label{display:block;font-size:.84rem;font-weight:600;color:#374151;margin-bottom:.35rem}
  .field input,.field select{width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.95rem;outline:none;transition:border-color .15s}
  .field input:focus,.field select:focus{border-color:#3a5a40}
  .plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
  .plan-opt{border:2px solid #e5e7eb;border-radius:8px;padding:.75rem .5rem;text-align:center;cursor:pointer;transition:all .15s;position:relative}
  .plan-opt.selected{border-color:#3a5a40;background:#f0f5f1}
  .plan-opt input{position:absolute;opacity:0;width:0;height:0}
  .plan-opt-name{font-size:.78rem;font-weight:700;color:#374151;margin-bottom:.2rem}
  .plan-opt-price{font-size:.72rem;color:#6b7280}
  .plan-opt-badge{font-size:.65rem;background:#3a5a40;color:#fff;border-radius:4px;padding:1px 5px;margin-bottom:.3rem;display:inline-block}
  .btn{display:block;width:100%;padding:12px;background:#3a5a40;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .15s}
  .btn:hover{background:#4a7050}
  .btn:disabled{background:#9ca3af;cursor:not-allowed}
  .error{background:#fef2f2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:.88rem;margin-bottom:1rem}
  .login-link{text-align:center;font-size:.85rem;color:#6b7280;margin-top:1.25rem}
  .login-link a{color:#3a5a40;font-weight:600;text-decoration:none}
  .section-label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin-bottom:.75rem}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏕️ Camp<span>Book</span></div>
  <div class="subtitle">Create your free account — takes 2 minutes</div>

  <div id="error-box"></div>

  <div class="field">
    <label>Campsite / caravan park name</label>
    <input type="text" id="campsite-name" placeholder="e.g. Meadowbrook Caravan Park" autocomplete="organization">
  </div>
  <div class="field">
    <label>Your email</label>
    <input type="email" id="email" placeholder="you@yourcampsite.co.uk" autocomplete="email">
  </div>
  <div class="field">
    <label>Choose a password</label>
    <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
  </div>

  <div class="section-label">Choose your plan</div>
  <div class="plan-grid">
    <label class="plan-opt" id="plan-campbook_only">
      <input type="radio" name="plan" value="campbook_only" checked>
      <div class="plan-opt-name">CampBook Only</div>
      <div class="plan-opt-price">Free + 5%</div>
    </label>
    <label class="plan-opt selected" id="plan-bundle">
      <input type="radio" name="plan" value="bundle">
      <div class="plan-opt-badge">Popular</div>
      <div class="plan-opt-name">Site + CampBook</div>
      <div class="plan-opt-price">£29/mo + 3%</div>
    </label>
    <label class="plan-opt" id="plan-website_only">
      <input type="radio" name="plan" value="website_only">
      <div class="plan-opt-name">Website Only</div>
      <div class="plan-opt-price">£19/mo</div>
    </label>
  </div>

  <button class="btn" id="signup-btn">Create my account →</button>
  <div class="login-link">Already have an account? <a href="/admin">Sign in</a></div>
</div>

<script>
// Plan selection highlight
document.querySelectorAll('.plan-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.plan-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
  });
});
// Default selected
document.getElementById('plan-bundle').classList.add('selected');
document.querySelector('#plan-bundle input').checked = true;

document.getElementById('signup-btn').addEventListener('click', async () => {
  const campsiteName = document.getElementById('campsite-name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const plan = document.querySelector('input[name="plan"]:checked').value;
  const errBox = document.getElementById('error-box');
  errBox.innerHTML = '';

  if (!campsiteName || !email || !password) {
    errBox.innerHTML = '<div class="error">Please fill in all fields.</div>'; return;
  }
  if (password.length < 8) {
    errBox.innerHTML = '<div class="error">Password must be at least 8 characters.</div>'; return;
  }

  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = 'Creating your account…';

  try {
    const res = await fetch('/api/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ campsiteName, email, password, plan }) });
    const data = await res.json();
    if (!res.ok) { errBox.innerHTML = `<div class="error">${data.message || 'Something went wrong'}</div>`; btn.disabled=false; btn.textContent='Create my account →'; return; }
    localStorage.setItem('cb_token', data.token);
    localStorage.setItem('cb_tenant', data.tenantName);
    window.location.href = '/admin';
  } catch(e) {
    errBox.innerHTML = '<div class="error">Network error — please try again.</div>';
    btn.disabled=false; btn.textContent='Create my account →';
  }
});
</script>
</body>
</html>
